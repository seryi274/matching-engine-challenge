<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, initial-scale=1.0">
  <title>Matching Engine Challenge - Final Reveal</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Chart.js 4.x (available if needed for future slides) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>

  <!-- canvas-confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

  <!-- App CSS -->
  <link rel="stylesheet" href="css/style.css">

  <style>
    /* Reveal-specific overrides */
    body {
      overflow: hidden;
      cursor: none;
    }
    body:hover {
      cursor: default;
    }
  </style>
</head>
<body>

  <!-- ===== Full-screen reveal container ===== -->
  <div class="reveal-container">
    <div id="reveal-content">
      <!-- Slides rendered here by reveal.js -->
      <div class="reveal-slide animate-fade-in">
        <h1 class="reveal-heading">Matching Engine Challenge</h1>
        <p class="reveal-subheading">Loading...</p>
      </div>
    </div>
  </div>

  <!-- ===== Progress indicator ===== -->
  <div class="reveal-progress">
    <span class="reveal-progress__text" id="reveal-progress-text">Loading...</span>
    <div class="reveal-progress__bar">
      <div class="reveal-progress__fill" id="reveal-progress-fill" style="width:0%"></div>
    </div>
    <span class="reveal-progress__hint" id="reveal-progress-hint">SPACE / &rarr; to advance</span>
  </div>

  <!-- App JS -->
  <script src="js/reveal.js"></script>

</body>
</html>
